name: Release (Fork)

on:
  push:
    tags:
      - "v*" # any tag — including beta, rc, etc.
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 0.8.0-beta-2)"
        required: true
        type: string

concurrency:
  group: release-fork-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Job 1: Build web dashboard ──────────────────────────────────────
  build-web:
    name: Build Web Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.0

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web dashboard
        run: cargo web build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  # ── Job 2: Build x86_64-linux-gnu binary ────────────────────────────
  build:
    name: Build x86_64-linux-gnu
    needs: build-web
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.93.0
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: linux-x86_64

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: web/dist/

      - name: Build binary
        run: >
          cargo build --profile ci --locked
          --features "channel-matrix,channel-lark,whatsapp-web"
          --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p staging/web
          cp target/x86_64-unknown-linux-gnu/ci/zeroclaw staging/
          cp -r web/dist staging/web/dist
          cd staging
          tar czf ../zeroclaw-x86_64-unknown-linux-gnu.tar.gz zeroclaw web/dist

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zeroclaw-x86_64-unknown-linux-gnu
          path: zeroclaw-x86_64-unknown-linux-gnu.tar.gz
          retention-days: 14

  # ── Job 3: Create GitHub Release ────────────────────────────────────
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: zeroclaw-*
          path: artifacts/

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f -name '*.tar.gz' -exec sha256sum {} + \
            | sed 's|  \./[^/]*/|  |' > SHA256SUMS
          cat SHA256SUMS

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name 'SHA256SUMS' \) \
            -exec cp {} release-assets/ \;
          cp install.sh release-assets/
          echo "--- Release assets ---"
          ls -lh release-assets/

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            TAG="$REF_NAME"
          else
            # Manual dispatch — derive tag from version input
            TAG="v${INPUT_VERSION#v}"
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          if [ -f "CHANGELOG-next.md" ]; then
            echo "Using CHANGELOG-next.md as release notes"
            BODY=$(cat CHANGELOG-next.md)
          else
            PREV_TAG=$(git tag --sort=-creatordate \
              | grep -v "^${TAG}$" \
              | head -1 || echo "")
            if [ -z "$PREV_TAG" ]; then
              RANGE="HEAD"
            else
              RANGE="${PREV_TAG}..HEAD"
            fi

            COMMITS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges || true)
            if [ -z "$COMMITS" ]; then
              COMMITS="- No changes since last tag"
            fi

            BODY=$(cat <<NOTES_EOF
          ## Changes

          ${COMMITS}

          ---
          *Fork release ${TAG} — full changelog: ${PREV_TAG}...${TAG}*
          NOTES_EOF
            )
          fi

          {
            echo "body<<BODY_EOF"
            echo "$BODY"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_SHA: ${{ github.sha }}
          NOTES: ${{ steps.notes.outputs.body }}
        run: |
          printf '%s\n' "$NOTES" > release-notes.md

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            gh release create "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --target "$COMMIT_SHA" \
              --prerelease
          else
            gh release create "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --prerelease
          fi
